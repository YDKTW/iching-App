    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Native Web Audio API Synthesizer - Generates meditational Singing Bowl sound
        function playZenChime() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const now = ctx.currentTime;

                const oscillators = [
                    { freq: 144, gain: 0.5, decay: 4.5 },   
                    { freq: 144 * 2.76, gain: 0.2, decay: 3.5 }, 
                    { freq: 144 * 4.4, gain: 0.15, decay: 2.5 },  
                    { freq: 144 * 5.4, gain: 0.1, decay: 1.5 }    
                ];

                const masterFilter = ctx.createBiquadFilter();
                masterFilter.type = 'lowpass';
                masterFilter.frequency.setValueAtTime(900, now);
                masterFilter.Q.setValueAtTime(1, now);
                masterFilter.connect(ctx.destination);

                oscillators.forEach(oscSpec => {
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();

                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(oscSpec.freq, now);
                    
                    const lfo = ctx.createOscillator();
                    const lfoGain = ctx.createGain();
                    lfo.frequency.setValueAtTime(5.8 + Math.random(), now); 
                    lfoGain.gain.setValueAtTime(1.5, now); 
                    lfo.connect(lfoGain);
                    lfoGain.connect(osc.frequency);

                    osc.connect(gainNode);
                    gainNode.connect(masterFilter);

                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(oscSpec.gain, now + 0.08); 
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + oscSpec.decay); 

                    lfo.start(now);
                    osc.start(now);

                    lfo.stop(now + oscSpec.decay);
                    osc.stop(now + oscSpec.decay);
                });
            } catch (err) {
                console.log("Audio play blocked until human interaction.");
            }
        }

        const TRIGRAMS = {
            "乾": { name: "乾", nature: "天", lines: [1, 1, 1], symbol: "☰" },
            "兌": { name: "兌", nature: "澤", lines: [1, 1, 0], symbol: "☱" },
            "離": { name: "離", nature: "火", lines: [1, 0, 1], symbol: "☲" },
            "震": { name: "震", nature: "雷", lines: [1, 0, 0], symbol: "☳" },
            "巽": { name: "巽", nature: "風", lines: [0, 1, 1], symbol: "☴" },
            "坎": { name: "坎", nature: "水", lines: [0, 1, 0], symbol: "☵" },
            "艮": { name: "艮", nature: "山", lines: [0, 0, 1], symbol: "☶" },
            "坤": { name: "坤", nature: "地", lines: [0, 0, 0], symbol: "☷" }
        };

        const HEXAGRAMS_SPECS = [
            { id: 1, name: "乾", upper: "乾", lower: "乾", guaci: "元、亨、利、貞。", tuanci: "大哉乾元，萬物資始，乃統天。雲行雨施，品物流形，大明終始，六位時成，時乘六龍以御天。乾道變化，各正性命，保合大和，乃利貞。首出庶物，萬國咸寧。", xiangci: "天行健，君子以自強不息。", lines_ci: ["潛龍勿用。", "見龍在田，利見大人。", "君子終日乾乾，夕惕若，厲无咎。", "或躍在淵，无咎。", "飛龍在天，利見大人。", "亢龍有悔。"], zen_tips: "乾卦純陽剛烈，代表純粹的能量與創造力。修行者此時當發大願心，精進不懈，但亦須注意初爻之潛藏與上爻之戒驕慢。" },
            { id: 2, name: "坤", upper: "坤", lower: "坤", guaci: "元亨，利牝馬之貞。君子有攸往，先迷後得，主利。西南得朋，東北喪朋，安貞吉。", tuanci: "至哉坤元，萬物資生，乃順承天。坤厚載物，德合无疆，含弘光大，品物咸亨。牝馬地類，行地无疆。柔順利貞，君子攸行，先迷失道，後順得常。西南得朋，乃與類行，東北喪朋，乃終有慶，安貞之吉，應地无疆。", xiangci: "地勢坤，君子以厚德載物。", lines_ci: ["履霜，堅冰至。", "直方大，不習无不利。", "含章可貞，或從王事，无成有終。", "括囊，无咎无譽。", "黃裳，元吉。", "龍戰于野，其血玄黃。"], zen_tips: "坤卦代表至柔至順。修道首重「大地之德」，包容萬物，順應天時。不要搶在前面主導，而應當安靜跟隨，守持靜觀。" },
            { id: 3, name: "屯", upper: "坎", lower: "震", guaci: "元、亨、利、貞。勿用有攸往，利建侯。", tuanci: "屯，剛柔始交而難生，動乎險中，大亨貞。雷雨之動，滿盈。天造草昧，宜建侯而不寧。", xiangci: "雲雷，屯；君子以經綸。", lines_ci: ["磐桓，利居貞，利建侯。", "屯如邅如，乘馬班如。匪寇婚媾，女子貞不字，十年乃字。", "即鹿无虞，惟入于林中。君子幾不如舍，往吝。", "乘馬班如，求婚媾。往，吉无不利。", "屯其膏。小貞吉，大貞凶。", "乘馬班如，泣血漣如。"], zen_tips: "屯卦為剛柔交始，萬物初生之艱難。猶如破土萌芽之種子，雖然面臨壓力，但生機無限。切忌急躁，宜安守定力。" },
            { id: 4, name: "蒙", upper: "艮", lower: "坎", guaci: "亨。匪我求童蒙，童蒙求我。初筮告，再三瀆，瀆則不告。利貞。", tuanci: "蒙，山下有險，險而止，蒙。蒙，亨，以亨行，時中也。匪我求童蒙，童蒙求我，志應也。初筮告，以剛中也。再三瀆，瀆則不告，瀆蒙也。蒙以養正，聖功也。", xiangci: "山下出泉，蒙；君子以果行育德。", lines_ci: ["發蒙，利用刑人，用說桎梏，以往吝。", "包蒙吉，納婦吉，子克家。", "勿用取女，見金夫，不有躬，无攸利。", "困蒙，吝。", "童蒙，吉。", "擊蒙，不利為寇，利禦寇。"], zen_tips: "蒙卦象徵矇矓初啟。修行在於「破愚啟智」。要以謙和恭敬之誠意向明師求教，而不是自以為是。以清淨心破除心靈的迷霧。" },
            { id: 5, name: "需", upper: "坎", lower: "乾", guaci: "有孚，光亨，貞吉。利涉大川。", tuanci: "需，須也，險在前也。剛健而不陷，其義不困窮矣。需，有孚，光亨，貞吉，位乎天位，以正中也。利涉大川，往有功也。", xiangci: "雲上於天，需；君子以飲食宴樂。", lines_ci: ["需于郊，利用恆，无咎。", "需于沙，小有言，終吉。", "需于泥，致寇至。", "需于血，出自穴。", "需于酒食，貞吉。", "入于穴，有不速之客三人來，敬之終吉。"], zen_tips: "需卦意為等待與蓄勢。前方雖有險阻（坎），但若有充足的剛健之氣（乾），便不應冒險進取。此時當身心放鬆，在「飲食宴樂」中保養元氣，靜待時機。" },
            { id: 6, name: "訟", upper: "乾", lower: "坎", guaci: "有孚，窒。惕中吉，終凶。利見大人，不利涉大川。", tuanci: "訟，上剛下險，險而健，訟。訟有孚，窒惕，中吉，剛來而得中也。終凶，訟不可成也。利見大人，尚中正也。不利涉大川，入于淵也。", xiangci: "天與水違行，訟；君子以作事謀始。", lines_ci: ["不永所事，小有言，終吉。", "不克訟，歸而逋，其邑人三百戶，无眚。", "食舊德，貞厲，終吉。或從王事，无成。", "不克訟，復即命渝，安貞吉。", "訟，元吉。", "或錫之鞶帶，終朝三褫之。"], zen_tips: "訟卦代表相違。內險而外剛健，必然引起爭端。在修行上，爭訟皆是執著於「我相」而起。退一步海闊天空，及早熄滅嗔恨與爭鬥之心。" },
            { id: 7, name: "師", upper: "坤", lower: "坎", guaci: "貞，丈人吉，无咎。", tuanci: "師，眾也；貞，正也。能以眾正，可以王矣。剛中而應，行險而順，以此毒天下，而民從之，吉又何咎矣。", xiangci: "地中有水，師；君子以容民畜眾。", lines_ci: ["師出以律，否臧凶。", "在師中吉，无咎，王三錫命。", "師或輿尸，凶。", "師左次，无咎。", "田有禽，利執言，无咎. 長子帥師，弟子輿尸，貞凶。", "大君有命，開國承家，小人勿用。"], zen_tips: "師卦象徵紀律與統御。地底暗藏洶湧之水。修行是一場與內心「煩惱魔」作戰的戰役。必須有極其嚴格的「戒律」與「專注力」來引導，方能降伏內心。" },
            { id: 8, name: "比", upper: "坎", lower: "坤", guaci: "吉。原筮元永貞，无咎。不寧方來，後夫凶。", tuanci: "比，吉也。比，輔也，下順從也。原筮元永貞，无咎，以剛中也。不寧方來，上下應也。後夫凶，其道窮也。", xiangci: "地上有水，比；先王以建萬國，親諸侯。", lines_ci: ["有孚比之，无咎。有孚盈缶，終來有它，吉。", "比之自內，貞吉。", "比之匪人。", "外比之，貞吉。", "顯比，王用三驅，失前禽。邑人不誡，吉。", "比之无首，凶。"], zen_tips: "比卦意為親輔、融合。水流地上，大地滋潤。修行非孤芳自賞，而是與法界一切眾生相應相通。尋求同願同行的「法侶」共修，以大慈大悲之心包容一切。" },
            { id: 9, name: "小畜", upper: "巽", lower: "乾", guaci: "亨。密雲不雨，自我西郊。", tuanci: "小畜，柔得位而上下應之，曰小畜。健而巽，剛中而志行，乃亨。密雲不雨，尚往也；自我西郊，施未行也。", xiangci: "風行天上，小畜；君子以懿文德。", lines_ci: ["復自道，何其咎，吉。", "牽復，吉。", "輿說輻，夫妻反目。", "有孚，血去惕出，无咎。", "有孚攣如，富以其鄰。", "既雨既處，尚德載，婦貞厲。月幾望，君子征凶。"], zen_tips: "小畜卦代表微小的積蓄。雖然「密雲不雨」，但生機正在蓄積。修持此卦者，不宜急於求大成就，應從小處做起，注重當下的一呼吸、一念頭，調順內心風息。" },
            { id: 10, name: "履", upper: "乾", lower: "兌", guaci: "履虎尾，不咥人，亨。", tuanci: "履，柔履剛也。說而應乎乾，是以履虎尾，不咥人，亨。剛中正，履帝位而不疚，光明也。", xiangci: "上天下澤，履；君子以辨上下，定民志。", lines_ci: ["素履，往，无咎。", "履道坦坦，幽人貞吉。", "眇能視，跛能履，履虎尾，咥人，凶。武人為于大君。", "履虎尾，愬愬，終吉。", "夬履，貞厲。", "視履考祥，其旋元吉。"], zen_tips: "履卦意為履行與禮儀。踩在老虎尾巴上，若能柔順應對，老虎也不會咬人。這是在紅塵修行、隨緣度眾的極致智慧。無論世俗局勢多凶險，只要心存謙遜禮敬，便能化險為夷。" },
            { id: 11, name: "泰", upper: "坤", lower: "乾", guaci: "小往大來，吉亨。", tuanci: "泰，小往大來，吉亨，則是天地交而萬物通也，上下交而其志同也。內陽而外陰，內健而外順，內君子而外小人，君子道長，小人道消也。", xiangci: "天地交，泰；后以財成天地之道，輔相天地之宜，以左右民。", lines_ci: ["拔茅茹，以其彙，征吉。", "包荒，用馮河，不遐遺，朋亡，得尚于中行。", "无平不陂，无往不復，艱貞无咎。勿恤其孚，于食有福。", "翩翩，不富以其鄰，不戒以孚。", "帝乙歸妹，以祉元吉。", "城復于隍，勿用師。自邑告命，貞吝。"], zen_tips: "泰卦代表天地交泰，萬物亨通。天降其氣，地承其養。此為修行的大平靜期，福慧雙增。然而「无平不陂，无往不復」，身處順境亦要時時反觀自省，防止因懈怠而下滑。" },
            { id: 12, name: "否", upper: "乾", lower: "坤", guaci: "否之匪人，不利君子貞，大往小來。", tuanci: "否之匪人，不利君子貞，大往小來，則是天地不交而萬物不通也，上下不交而天下无邦也。內陰而外陽，內柔而外剛，內小人而外君子，小人道長，君子道消也。", xiangci: "天地不交，否；君子以儉德辟難，不可榮以祿。", lines_ci: ["拔茅茹，以其彙，貞吉，亨。", "包承。小人吉，大人否亨。", "包羞。", "有命无咎，疇離祉。", "休否，大人吉. 其亡其亡，繫于苞桑。", "傾否，先否後喜。"], zen_tips: "否卦為天地不交，萬物不通。此乃修行之「暗夜」或瓶頸期，小人道長，阻礙極多。此時當「儉德辟難」，收斂鋒芒，不求名利，潛心內省修煉，靜等痞塞消解。" },
            { id: 13, name: "同人", upper: "乾", lower: "離", guaci: "同人于野，亨。利涉大川，利君子貞。", tuanci: "同人，柔得位得中而應乎乾，曰同人。同人曰：同人于野，亨，利涉大川，乾行也。文明以健，中正而應，君子正也，唯君子為能通天下之志。", xiangci: "天與火，同人；君子以類族辨物。", lines_ci: ["同人于門，无咎。", "同人于宗，吝。", "伏戎于莽，升其高陵，三歲不興。", "乘其墉，弗克攻，吉。", "同人，先號咷而後笑。大師克相遇。", "同人于郊，无悔。"], zen_tips: "同人卦象徵大同與無私。光明普照，天火同輝。修行者當打破門戶之見與宗派之執（避免「同人于宗」），以虛空般的心量，廣度一切有情，與十方三世眾生同心同體。" },
            { id: 14, name: "大有", upper: "離", lower: "乾", guaci: "元亨。", tuanci: "大有，柔得尊位大中，而上下應之，曰大有。其德剛健而文明，應乎天而時行，是以元亨。", xiangci: "火在天上，大有；君子以遏惡揚善，順天休命。", lines_ci: ["无交害，匪咎，艱則无咎。", "大車以載，有攸往，无咎。", "公用亨于天子，小人弗克。", "匪其彭，无咎。", "厥孚交如，威如；吉。", "自天祐之，吉无不利。"], zen_tips: "大有卦代表大為富有、光芒耀眼。雖處高位，但心繫天下。修道有成或世法發達時，不可生傲慢。當「遏惡揚善」，利益大眾，以此清淨功功德迴向法界，必能「自天祐之」。" },
            { id: 15, name: "謙", upper: "坤", lower: "艮", guaci: "亨，君子有終。", tuanci: "謙，亨。天道下濟而光明，地道卑而上行。天道虧盈而益謙，地道變盈而流謙，鬼神害盈而福謙，人道惡盈而好謙。謙尊而光，卑而不可踰，君子之終也。", xiangci: "地中有山，謙；君子以裒多益寡，稱物平施。", lines_ci: ["謙謙君子，用涉大川，吉。", "鳴謙，貞吉。", "勞謙君子，萬民服，吉。", "无不利，撝謙。", "不富以其鄰，利用侵伐，无不利。", "鳴謙，利用行師，征邑國。"], zen_tips: "謙卦是易經中「唯一六爻皆吉」之卦。高山隱入地底。這代表了修行者的最高境界——「無我」。越是有大德大能，心境越是卑下柔和。謙虛是通往證悟最安全的捷徑。" },
            { id: 16, name: "豫", upper: "震", lower: "坤", guaci: "利建侯行師。", tuanci: "豫，剛應而志行，順以動，豫。豫順以動，故天地如之，而況建侯行師乎？天地以順動，故日月不過，而四時不忒。聖人以順動，則刑罰清而民服。豫之時義大矣哉。", xiangci: "雷出地奮，豫。先王以作樂崇德，殷薦之上帝，以配祖考。", lines_ci: ["鳴豫，凶。", "介于石，不終日，貞吉。", "盱豫，悔。遲有悔。", "由豫，大有得. 勿疑. 朋盍簪。", "貞疾，恆不死。", "冥豫，成有渝，无咎。"], zen_tips: "豫卦代表喜悅與順應。內心順從，外在震動激發。修行者此時容易感到法喜充滿。但需防過度安逸流於放縱、迷失（「冥豫」）。當如「介于石」般保持覺照之敏銳。" },
            { id: 17, name: "隨", upper: "兌", lower: "震", guaci: "元亨利貞，无咎。", tuanci: "隨，剛來而下柔，動而說，隨。大亨，貞，无咎，而天下隨時，隨時之義大矣哉。", xiangci: "澤中有雷，隨；君子以嚮晦入宴息。", lines_ci: ["官有渝，貞吉。出門交有功。", "係小子，失丈夫。", "係丈夫，失小子. 隨有求得，利居貞。", "隨有獲，貞凶. 有孚在道，以明，何咎。", "孚于嘉，吉。", "拘係之，乃從維之. 王用亨于西山。"], zen_tips: "隨卦象徵順應、隨緣。雷入澤中，順理而行。在修行上，這是「隨緣不變，不變隨緣」的無上法門。不要死板對抗世俗，而是要學會因材施教，在隨緣妙用中度化眾生。" },
            { id: 18, name: "蠱", upper: "艮", lower: "巽", guaci: "元亨，利涉大川. 先甲三日，後甲三日。", tuanci: "蠱，剛上而柔下，巽而止，蠱。蠱元亨，而天下治也；利涉大川，往有事也；先甲三日，後甲三日，終則有始，天行也。", xiangci: "山下有風，蠱；君子以振民育德。", lines_ci: ["幹父之蠱，有子，考无咎，厲終吉。", "幹母之蠱，不可貞。", "幹父之蠱，小有悔，无大咎。", "裕父之蠱，往見吝。", "幹父之蠱，用譽。", "不事王侯，高尚其事。"], zen_tips: "蠱卦意為敗壞、需要整治。修持此卦代表內心深處堆積了陳舊的煩惱垢障。不能再逃避，當痛下決心掃除「貪、嗔、癡、慢、疑」等五毒。終則有始，重獲清淨新生。" },
            { id: 19, name: "臨", upper: "坤", lower: "兌", guaci: "元亨利貞. 至於八月有凶。", tuanci: "臨，剛浸而長，說而順，剛中而應，大亨以正，天之道也；至于八月有凶，消不久也。", xiangci: "澤上有地，臨；君子以教思无窮，容保民无疆。", lines_ci: ["咸臨，貞吉。", "咸臨，吉无不利。", "甘臨，无攸利. 既憂之，无咎。", "至臨，无咎。", "知臨，大君之宜，吉。", "敦臨，吉，无咎。"], zen_tips: "臨卦象徵親臨、向下關懷。地勢高臨，澤水在下。修道者當慈悲下濟，深入基層弘法度生。然而「至於八月有凶」，好運不會永無止境，須有憂患意識，未雨綢繆。" },
            { id: 20, name: "觀", upper: "巽", lower: "坤", guaci: "盥而不薦，有孚顒若。", tuanci: "大觀在上，順而巽，中正以觀天下。觀盥而不薦，有孚顒若，下觀而化也。觀天之神道，而四時不忒，聖人以神道設教，而天下服矣。", xiangci: "風行地上，觀；先王以省方，觀民設教。", lines_ci: ["童觀，小人无咎，君子吝。", "闚觀，利女貞。", "觀我生，進退。", "觀國之光，利用賓于王。", "觀我生，君子无咎。", "觀其生，君子无咎。"], zen_tips: "觀卦是極具禪意的一卦，代表「禪觀」與「省察」。如風拂大地。修行首重「觀照內心」與「返聞自性」。洗手後尚未獻祭之時，內心最是純淨虔誠。持此正念，洞察宇宙人生本質。" },
            { id: 21, name: "噬嗑", upper: "離", lower: "震", guaci: "亨，利用獄。", tuanci: "頤中有物，曰噬嗑。噬嗑而亨，剛柔分動而明，雷電合而章，柔得中而上行，雖不當位，利用獄也。", xiangci: "雷電噬嗑，先王以明罰敕法。", lines_ci: ["屨校滅趾，无咎。", "噬膚，滅鼻，无咎。", "噬腊肉，遇毒，小吝无咎。", "噬乾胏，得金矢，利艱貞吉。", "噬乾肉，得黃金，貞厲无咎。", "何校滅耳，凶。"], zen_tips: "噬嗑卦上離下震，雷電交作，如齒噬物而合。修行上代表以智慧（離明）斷除心中橫阻的障礙（震動而噬）。遇有煩惱糾結，不可姑息養奸，當果斷噬斷；但下手仍須明察謹慎，勿逞一時剛猛，以免傷及無辜。" },
            { id: 22, name: "賁", upper: "艮", lower: "離", guaci: "亨，小利有攸往。", tuanci: "賁亨。柔來而文剛，故亨。分剛上而文柔，故小利有攸往，天文也。文明以止，人文也。觀乎天文，以察時變，觀乎人文，以化成天下。", xiangci: "山下有火，賁，君子以明庶政，无敢折獄。", lines_ci: ["賁其趾，舍車而徒。", "賁其須。", "賁如濡如，永貞吉。", "賁如皤如，白馬翰如，匪寇婚媾。", "賁于丘園，束帛戔戔，吝，終吉。", "白賁，无咎。"], zen_tips: "賁卦意為文飾。山下有火，光耀山林，外表華美而根本樸實。修行者可適度以莊嚴威儀攝眾（賁），然須謹記「白賁无咎」——洗盡鉛華、返璞歸真方為究竟，切莫本末倒置，以文害質。" },
            { id: 23, name: "剝", upper: "艮", lower: "坤", guaci: "不利有攸往。", tuanci: "剝，剝也，柔變剛也。不利有攸往，小人長也。順而止之，觀象也。君子尚消息盈虛，天行也。", xiangci: "山附於地，剝，上以厚下安宅。", lines_ci: ["剝床以足，蔑貞凶。", "剝床以辨，蔑貞凶。", "剝之无咎。", "剝床以膚，凶。", "貫魚以宮人寵，无不利。", "碩果不食，君子得輿，小人剝廬。"], zen_tips: "剝卦五陰剝一陽，山附於地，代表衰頹剝落之極。修行逢此，如置身逆境、根基動搖，不宜妄動。當效法「上以厚下安宅」之精神，安住當下，靜待陽氣復生，堅信「碩果不食」，一線生機終將萌發。" },
            { id: 24, name: "復", upper: "坤", lower: "震", guaci: "亨。出入无疾，朋來无咎。反復其道，七日來復。利有攸往。", tuanci: "復，亨。剛反，動而以順行，是以出入无疾，朋來无咎，反復其道，七日來復，天行也。利有攸往，剛長也。復，其見天地之心乎。", xiangci: "雷在地中，復，先王以至日閉關，商旅不行，后不省方。", lines_ci: ["不遠復，无祇悔，元吉。", "休復，吉。", "頻復，厲，无咎。", "中行獨復。", "敦復，无悔。", "迷復，凶，有災眚，用行師，終有大敗，以其國君凶，至于十年不克征。"], zen_tips: "復卦一陽來復於群陰之下，雷藏地中，象徵生機初返。修行者歷經剝落之後，此時當如「先王以至日閉關」，收攝身心，靜養初萌之善根，不遠而復，勿待迷失已深方悟，元吉之機在於察之於微。" },
            { id: 25, name: "无妄", upper: "乾", lower: "震", guaci: "元亨，利貞。其匪正有眚，不利有攸往。", tuanci: "无妄，剛自外來而為主於內，動而健，剛中而應，大亨以正，天之命也，其匪正有眚，不利有攸往。无妄之往，何之矣。天命不祐，行矣哉。", xiangci: "天下雷行，物與无妄，先王以茂對時，育萬物。", lines_ci: ["无妄往，吉。", "不耕穫，不菑畬，則利有攸往。", "无妄之災，或繫之牛，行人之得，邑人之災。", "可貞，无咎。", "无妄之疾，勿藥有喜。", "无妄行，有眚，无攸利。"], zen_tips: "无妄卦天下雷行，萬物依乎天理而動，不敢妄為。修行貴在「无妄」二字：不存機心，不求妄得，一切依循自然天理與因果法則行事。若心存造作攀緣，即是「无妄之疾」，唯有回歸本然天真，方能勿藥而喜。" },
            { id: 26, name: "大畜", upper: "艮", lower: "乾", guaci: "利貞。不家食吉，利涉大川。", tuanci: "大畜，剛健篤實，輝光日新其德，剛上而尚賢，能止健，大正也。不家食吉，養賢也；利涉大川，應乎天也。", xiangci: "天在山中，大畜，君子以多識前言往行，以畜其德。", lines_ci: ["有厲，利已。", "輿說輹。", "良馬逐，利艱貞。曰閑輿衛，利有攸往。", "童牛之牿，元吉。", "豶豕之牙，吉。", "何天之衢，亨。"], zen_tips: "大畜卦天在山中，象徵蓄養深厚剛健之德。修行者當效法此卦，「多識前言往行以畜其德」，廣學多聞、積累福慧資糧。然蓄養之初仍須「有厲利已」，知止而不躁進，待德業充實，方能「何天之衢」，暢行無阻。" },
            { id: 27, name: "頤", upper: "艮", lower: "震", guaci: "貞吉. 觀頤，自求口實。", tuanci: "頤，貞吉，養正則吉也。觀頤，觀其所養也；自求口實，觀其自養也。天地養萬物，聖人養賢以及萬民，頤之時大矣哉。", xiangci: "山下有雷，頤，君子以慎言語，節飲食。", lines_ci: ["舍爾靈龜，觀我朵頤，凶。", "顛頤，拂經，于丘頤，征凶。", "拂頤，貞凶。十年勿用，无攸利。", "顛頤，吉，虎視眈眈，其欲逐逐，无咎。", "拂經，居貞吉，不可涉大川。", "由頤，厲吉，利涉大川。"], zen_tips: "頤卦上艮下震，山下有雷，象徵頤養之道。修行首重「慎言語，節飲食」——口為禍福之門，亦為道業所繫。當自求口實，涵養自身正念，勿貪求外物餵養（觀我朵頤），亦莫捨本逐末，方能頤養天和。" },
            { id: 28, name: "大過", upper: "兌", lower: "巽", guaci: "棟橈。利有攸往，亨。", tuanci: "大過，大者過也。棟橈，本末弱也。剛過而中，巽而說行，利有攸往，乃亨，大過之時大矣哉。", xiangci: "澤滅木，大過，君子以獨立不懼，遯世无悶。", lines_ci: ["藉用白茅，无咎。", "枯楊生稊，老夫得其女妻，无不利。", "棟橈，凶。", "棟隆，吉，有它吝。", "枯楊生華，老婦得其士夫，无咎无譽。", "過涉滅頂，凶，无咎。"], zen_tips: "大過卦棟樑彎曲，澤水淹沒林木，象徵非常之時、非常之責。修行路上偶遇「大過」之境——考驗超乎尋常，此時當效法「君子以獨立不懼，遯世无悶」的精神，縱使無人理解、身處逆境，亦能安住道心，不改其志。" },
            { id: 29, name: "坎", upper: "坎", lower: "坎", guaci: "習坎，有孚，維心亨，行有尚。", tuanci: "習坎，重險也。水流而不盈，行險而不失其信。維心亨，乃以剛中也；行有尚，往有功也。天險不可升也，地險山川丘陵也，王公設險以守其國，險之時用大矣哉。", xiangci: "水洊至，習坎，君子以常德行，習教事。", lines_ci: ["習坎，入于坎窞，凶。", "坎，有險，求小得。", "來之坎坎，險且枕，入于坎窞，勿用。", "樽酒，簋貳，用缶，納約自牖，終无咎。", "坎不盈，祗既平，无咎。", "係用徽纆，寘于叢棘，三歲不得，凶。"], zen_tips: "坎卦上下皆坎，重險當前，水流不止。修行者身陷困境重重、煩惱疊生之時，當學水之德——「行險而不失其信」，維持內心的誠信與定力（維心亨），縱使外境險阻連連，只要中心信實不變，終能行有所尚，脫出重坎。" },
            { id: 30, name: "離", upper: "離", lower: "離", guaci: "利貞，亨。畜牝牛，吉。", tuanci: "離，麗也。日月麗乎天，百穀草木麗乎土，重明以麗乎正，乃化成天下。柔麗乎中正，故亨，是以畜牝牛吉也。", xiangci: "明兩作，離，大人以繼明照於四方。", lines_ci: ["履錯然，敬之，无咎。", "黃離，元吉。", "日昃之離，不鼓缶而歌，則大耋之嗟，凶。", "突如其來如，焚如，死如，棄如。", "出涕沱若，戚嗟若，吉。", "王用出征，有嘉折首，獲匪其醜，无咎。"], zen_tips: "離卦上下皆離，重明相繼，如日月相承，光明不絕。修行者當如「大人以繼明照於四方」，將內在覺性之光，念念相續、綿密不斷地照亮自身與他人。然光明過烈亦有「焚如死如」之虞，故柔麗中正、依附正道而行，方能長保清明。" },
            { id: 31, name: "咸", upper: "兌", lower: "艮", guaci: "亨，利貞，取女吉。", tuanci: "咸，感也。柔上而剛下，二氣感應以相與，止而說，男下女，是以亨，利貞，取女吉也。天地感而萬物化生，聖人感人心而天下和平。觀其所感，而天地萬物之情可見矣。", xiangci: "山上有澤，咸，君子以虛受人。", lines_ci: ["咸其拇。", "咸其腓，凶，居吉。", "咸其股，執其隨，往吝。", "貞吉，悔亡，憧憧往來，朋從爾思。", "咸其脢，无悔。", "咸其輔頰舌。"], zen_tips: "咸卦山上有澤，少男少女相感，代表以無心之至誠相互感通。修行貴在「虛受人」——放下我執成見，方能與萬法、與眾生真實感應。然而「憧憧往來」，心念紛馳攀緣則失其正，唯有止而後說，寂靜中方生真感通。" },
            { id: 32, name: "恆", upper: "震", lower: "巽", guaci: "亨，无咎，利貞，利有攸往。", tuanci: "恒，久也。剛上而柔下，雷風相與，巽而動，剛柔皆應，恒。恒，亨，无咎，利貞，久於其道也。天地之道，恒久而不已也，利有攸往，終則有始也，日月得天而能久照，四時變化而能久成，聖人久於其道而天下化成，觀其所恒而天地萬物之情可見矣。", xiangci: "雷風恆，君子以立不易方。", lines_ci: ["浚恆，貞凶，无攸利。", "悔亡。", "不恆其德，或承之羞，貞吝。", "田无禽。", "恆其德貞，婦人吉，夫子凶。", "振恆，凶。"], zen_tips: "恆卦雷風相與，象徵恆久不變之道。修行最難者莫過於「恆」，一時精進易，長久如一難。君子當「立不易方」，發長遠心，不因境遇順逆而改易道心。若求速效近功（浚恆），反致凶咎，唯有持之以恆，方見真章。" },
            { id: 33, name: "遯", upper: "乾", lower: "艮", guaci: "亨，小利貞。", tuanci: "遯亨，遯而亨也。剛當位而應，與時行也。小利貞，浸而長也。遯之時義大矣哉。", xiangci: "天下有山，遯，君子以遠小人，不惡而嚴。", lines_ci: ["遯尾，厲，勿用有攸往。", "執之用黃牛之革，莫之勝說。", "係遯，有疾厲，畜臣妾吉。", "好遯，君子吉，小人否。", "嘉遯，貞吉。", "肥遯，无不利。"], zen_tips: "遯卦天下有山，山勢雖高，仍在天下之中，象徵急流勇退、明哲保身的智慧。修行者遇小人道長之時，當學「不惡而嚴」——不必正面交鋒，只需守住分際、從容引退。退得越早越從容（肥遯），越是圓滿無礙。" },
            { id: 34, name: "大壯", upper: "震", lower: "乾", guaci: "利貞。", tuanci: "大壯，大者壯也，剛以動，故壯。大壯利貞，大者正也。正大而天地之情可見矣。", xiangci: "雷在天上，大壯，君子以非禮弗履。", lines_ci: ["壯于趾，征凶，有孚。", "貞吉。", "小人用壯，君子用罔。貞厲，羝羊觸藩，羸其角。", "貞吉，悔亡，藩決不羸，壯于大輿之輹。", "喪羊于易，无悔。", "羝羊觸藩，不能退，不能遂，无攸利，艱則吉。"], zen_tips: "大壯卦雷在天上，剛陽壯盛之極。修行者若正氣充盈、道力增長，切莫恃強冒進，如公羊觸藩，進退失據。當謹記「非禮弗履」，以正道規範壯盛之氣，剛而能謙，方是真正的大壯。" },
            { id: 35, name: "晉", upper: "離", lower: "坤", guaci: "康侯用錫馬蕃庶，晝日三接。", tuanci: "晉，進也。明出地上，順而麗乎大明，柔進而上行，是以康侯用錫馬蕃庶，晝日三接也。", xiangci: "明出地上，晉，君子以自昭明德。", lines_ci: ["晉如摧如，貞吉。罔孚裕，无咎。", "晉如愁如，貞吉。受茲介福，于其王母。", "眾允，悔亡。", "晉如鼫鼠，貞厲。", "悔亡，失得勿恤，往吉无不利。", "晉其角，維用伐邑，厲吉无咎，貞吝。"], zen_tips: "晉卦明出地上，如旭日初升，光明漸進。修行者當「自昭明德」，不假外求，讓自身本具的覺性光明逐步彰顯。前行途中或有阻滯（晉如摧如），只要心存誠信、順勢上行，終能柔進上行，光明日盛。" },
            { id: 36, name: "明夷", upper: "坤", lower: "離", guaci: "利艱貞。", tuanci: "明入地中，明夷。內文明而外柔順，以蒙大難，文王以之。利艱貞，晦其明也。內難而能正其志，箕子以之。", xiangci: "明入地中，明夷，君子以蒞眾，用晦而明。", lines_ci: ["明夷于飛，垂其翼，君子于行，三日不食。有攸往，主人有言。", "明夷，夷于左股，用拯馬壯吉。", "明夷于南狩，得其大首，不可疾貞。", "入于左腹，獲明夷之心，于出門庭。", "箕子之明夷，利貞。", "不明晦，初登于天，後入于地。"], zen_tips: "明夷卦光明沒入地中，象徵韜光養晦、內明外暗的處世之道。修行逢黑暗昏亂之世，不宜鋒芒畢露，當如箕子佯狂避禍，內心保有清明正念，外表則含藏收斂，「用晦而明」，靜待撥雲見日之時。" },
            { id: 37, name: "家人", upper: "巽", lower: "離", guaci: "利女貞。", tuanci: "家人，女正位乎內，男正位乎外，男女正，天地之大義也。家人有嚴君焉，父母之謂也。父父，子子，兄兄，弟弟，夫夫，婦婦，而家道正。正家，而天下定矣。", xiangci: "風自火出，家人，君子以言有物，而行有恆。", lines_ci: ["閑有家，悔亡。", "无攸遂，在中饋，貞吉。", "家人嗃嗃，悔厲吉，婦子嘻嘻，終吝。", "富家，大吉。", "王假有家，勿恤，吉。", "有孚，威如，終吉。"], zen_tips: "家人卦風自火出，由內而外，象徵修身齊家之道。道場如家，家亦是道場，君子修行當「言有物，行有恆」，先正己身，再及於人。防患於未然（閑有家），比事後嚴管更為根本，內心誠信具足，自然能感化眾人（威如）。" },
            { id: 38, name: "睽", upper: "離", lower: "兌", guaci: "小事吉。", tuanci: "睽，火動而上，澤動而下，二女同居，其志不同行。說而麗乎明，柔進而上行，得中而應乎剛，是以小事吉。天地睽而其事同也，男女睽而其志通也，萬物睽而其事類也，睽之時用大矣哉。", xiangci: "上火下澤，睽，君子以同而異。", lines_ci: ["悔亡，喪馬勿逐，自復。見惡人，无咎。", "遇主于巷，无咎。", "見輿曳，其牛掣，其人天且劓，无初有終。", "睽孤，遇元夫，交孚，厲无咎。", "悔亡。厥宗噬膚，往何咎。", "睽孤，見豕負塗，載鬼一車，先張之弧，後說之弧，匪寇婚媾。往，遇雨則吉。"], zen_tips: "睽卦火澤相違，象徵乖離睽異之時。修行路上與人見解不合、境遇分歧在所難免，君子當學「同而異」的智慧——求同存異，不強求外相一致，只需守住內在同一的道心。心中疑懼漸消（先張之弧，後說之弧），乖離終將復合。" },
            { id: 39, name: "蹇", upper: "坎", lower: "艮", guaci: "利西南，不利東北，利見大人，貞吉。", tuanci: "蹇，難也，險在前也。見險而能止，知矣哉。蹇，利西南，往得中也；不利東北，其道窮也。利見大人，往有功也；當位貞吉，以正邦也。蹇之時用大矣哉。", xiangci: "山上有水，蹇，君子以反身脩德。", lines_ci: ["往蹇來譽。", "王臣蹇蹇，匪躬之故。", "往蹇來反。", "往蹇來連。", "大蹇朋來。", "往蹇來碩，吉，利見大人。"], zen_tips: "蹇卦山上有水，行路艱難險阻。修行遭逢瓶頸、寸步難行之時，「見險而能止」正是智慧所在——不硬闖險境，轉而「反身脩德」，向內反觀自省、精進德業。艱難之中若能廣結善緣、朋來相助，終能化險為夷。" },
            { id: 40, name: "解", upper: "震", lower: "坎", guaci: "利西南，无所往，其來復吉，有攸往，夙吉。", tuanci: "解，險以動，動而免乎險，解。解，利西南，往得眾也；其來復吉，乃得中也；有攸往夙吉，往有功也。天地解而雷雨作，雷雨作而百果草木皆甲坼，解之時大矣哉。", xiangci: "雷雨作，解，君子以赦過宥罪。", lines_ci: ["无咎。", "田獲三狐，得黃矢，貞吉。", "負且乘，致寇至，貞吝。", "解而拇，朋至斯孚。", "君子維有解，吉，有孚于小人。", "公用射隼于高墉之上，獲之，无不利。"], zen_tips: "解卦雷雨交作，滯塞消解，萬物甲坼萌發，代表困厄結束、生機重現。修行者度過險難之後，當如「君子以赦過宥罪」，寬恕自己與他人過往的罪咎執著，放下心中糾結（解而拇），讓生命重新舒展、輕安自在。" },
            { id: 41, name: "損", upper: "艮", lower: "兌", guaci: "有孚，元吉，无咎，可貞，利有攸往。曷之用？二簋可用享。", tuanci: "損，損下益上，其道上行，損而有孚，元吉，无咎，可貞，利有攸往，曷之用，二簋可用享，二簋應有時，損剛益柔有時，損益盈虛，與時偕行。", xiangci: "山下有澤，損，君子以懲忿窒欲。", lines_ci: ["已事遄往，无咎，酌損之。", "利貞，征凶。弗損，益之。", "三人行，則損一人，一人行，則得其友。", "損其疾，使遄有喜，无咎。", "或益之十朋之龜，弗克違，元吉。", "弗損，益之，无咎，貞吉，利有攸往，得臣无家。"], zen_tips: "損卦山下有澤，澤自損以益山，象徵減損之道。修行的核心正在於「損」——損之又損，以至於無為，君子當「懲忿窒欲」，減損內心的貪嗔煩惱與物欲執著。看似有所損失，實則損去塵垢，方能顯露本自具足的元吉。" },
            { id: 42, name: "益", upper: "巽", lower: "震", guaci: "利有攸往，利涉大川。", tuanci: "益，損上益下，民說无疆，自上下下，其道大光。利有攸往，中正有慶；利涉大川，木道乃行。益動而巽，日進无疆，天施地生，其益无方，凡益之道，與時偕行。", xiangci: "風雷益，君子以見善則遷，有過則改。", lines_ci: ["利用為大作，元吉，无咎。", "或益之十朋之龜，弗克違，永貞吉。王用享于帝，吉。", "益之用凶事，无咎。有孚中行，告公用圭。", "中行，告公從，利用為依遷國。", "有孚惠心，勿問元吉。有孚惠我德。", "莫益之，或擊之，立心勿恒，凶。"], zen_tips: "益卦風雷相益，其勢日增，代表增益之道。修行的增益不假外求，貴在「見善則遷，有過則改」——見他人善行則見賢思齊，察覺己過則立即改正，如此日日精進，福慧自然增長無疆。若心無恆定，縱有外益也難守成（莫益之，或擊之）。" },
            { id: 43, name: "夬", upper: "兌", lower: "乾", guaci: "揚於王庭，孚號，有厲。告自邑，不利即戎，利有攸往。", tuanci: "夬，決也，剛決柔也。健而說，決而和。揚于王庭，柔乘五剛也；孚號有厲，其危乃光也；告自邑，不利即戎，所尚乃窮也；利有攸往，剛長乃終也。", xiangci: "澤上於天，夬，君子以施祿及下，居德則忌。", lines_ci: ["壯于前趾，往不勝為咎。", "惕號，莫夜有戎，勿恤。", "壯于頄，有凶。君子夬夬，獨行，遇雨若濡，有慍无咎。", "臀无膚，其行次且，牽羊悔亡，聞言不信。", "莧陸夬夬，中行无咎。", "无號，終有凶。"], zen_tips: "夬卦澤上於天，五陽決一陰，象徵當機立斷、決去邪僻之時。修行者面對最後殘存的煩惱習氣（一陰），當果決斷除，然仍須「揚于王庭」——光明磊落、誠信昭告，而非私下強行，更要慎防決而不和，居德忌驕，方能剛柔並濟。" },
            { id: 44, name: "姤", upper: "乾", lower: "巽", guaci: "女壯，勿用取女。", tuanci: "姤，遇也，柔遇剛也。勿用取女，不可與長也。天地相遇，品物咸章也；剛遇中正，天下大行也，姤之時義大矣哉。", xiangci: "天下有風，姤，后以施命誥四方。", lines_ci: ["繫于金柅，貞吉。有攸往，見凶。羸豕孚蹢躅。", "包有魚，无咎，不利賓。", "臀无膚，其行次且，厲，无大咎。", "包无魚，起凶。", "以杞包瓜，含章，有隕自天。", "姤其角，吝，无咎。"], zen_tips: "姤卦天下有風，一陰初生於五陽之下，象徵不期而遇。修行中偶遇的境緣、念頭，看似細微（一陰初生），若不謹慎防範，任其滋長，終將壯大難制（女壯）。故當於初萌之際便「繫于金柅」，及早收攝覺察，防微杜漸。" },
            { id: 45, name: "萃", upper: "兌", lower: "坤", guaci: "亨。王假有廟，利見大人，亨，利貞。用大牲吉，利有攸往。", tuanci: "萃，聚也。順以說，剛中而應，故聚也。王假有廟，致孝享也；利見大人，亨，聚以正也；用大牲，吉，利有攸往，順天命也。觀其所聚，而天地萬物之情可見矣。", xiangci: "澤上於地，萃，君子以除戎器，戒不虞。", lines_ci: ["有孚不終，乃亂乃萃，若號。一握為笑，勿恤，往无咎。", "引吉，无咎，孚乃利用禴。", "萃如嗟如，无攸利。往无咎，小吝。", "大吉，无咎。", "萃有位，无咎，匪孚。元永貞，悔亡。", "齎咨涕洟，无咎。"], zen_tips: "萃卦澤上於地，水澤匯聚，象徵眾緣和合、志同道合之聚。修行者若得同修法侶相聚共修（萃），實乃殊勝因緣，當以誠敬之心維繫（王假有廟）。然聚合之時亦須「除戎器，戒不虞」，防範散亂雜念，方能長保道場清淨。" },
            { id: 46, name: "升", upper: "坤", lower: "巽", guaci: "元亨。用見大人，勿恤。南征吉。", tuanci: "柔以時升，巽而順，剛中而應，是以大亨；用見大人，勿恤，有慶也；南征吉，志行也。", xiangci: "地中生木，升，君子以順德，積小以高大。", lines_ci: ["允升，大吉。", "孚乃利用禴，无咎。", "升虛邑。", "王用亨于岐山，吉，无咎。", "貞吉，升階。", "冥升，利于不息之貞。"], zen_tips: "升卦地中生木，樹木由地中緩緩滋長而上，象徵循序漸進的成長之道。修行貴在「積小以高大」，不求一步登天，唯有日日用功、點滴累積，道業自然如樹木拔地參天。切忌貪求速成而躁進冥升，反致耗竭。" },
            { id: 47, name: "困", upper: "兌", lower: "坎", guaci: "亨，貞，大人吉，无咎。有言不信。", tuanci: "困，剛揜也。險以說，困而不失其所亨，其唯君子乎。貞大人吉，以剛中也；有言不信，尚口乃窮也。", xiangci: "澤无水，困，君子以致命遂志。", lines_ci: ["臀困于株木，入于幽谷，三歲不覿。", "困于酒食，朱紱方來，利用享祀，征凶，无咎。", "困于石，據于蒺蔾，入于其宮，不見其妻，凶。", "來徐徐，困于金車。吝，有終。", "劓刖，困于赤紱，乃徐有說。利用祭祀。", "困于葛藟，于臲卼，曰動悔有悔，征吉。"], zen_tips: "困卦澤中無水，資糧枯竭，象徵身心俱疲的困頓之境。修行遇此逆境，言語辯解徒增其窮（有言不信），唯有「致命遂志」——縱使外境困厄至極，仍堅守內在志向不變。真正的君子，正是在困而不失其所亨的考驗中淬煉而成。" },
            { id: 48, name: "井", upper: "坎", lower: "巽", guaci: "改邑不改井，无喪无得，往來井井。汔至，亦未繘井，羸其瓶，凶。", tuanci: "巽乎水而上水，井，井養而不窮也。改邑不改井，乃以剛中也；汔至亦未繘井，未有功也；羸其瓶，是以凶也。", xiangci: "木上有水，井，君子以勞民勸相。", lines_ci: ["井泥不食，舊井无禽。", "井谷射鮒，甕敝漏。", "井渫不食，為我心惻，可用汲。王明，並受其福。", "井甃无咎。", "井洌，寒泉食。", "井收勿幕，有孚元吉。"], zen_tips: "井卦木上有水，水井滋養萬民而源源不絕，象徵利他不窮之德。修行者當如深井，「井養而不窮」——不論外境興衰更迭（改邑不改井），內在覺性與慈悲的活水恆常清澈，隨時可供他人汲取，方不負此卦「勞民勸相」之教。" },
            { id: 49, name: "革", upper: "兌", lower: "離", guaci: "已日乃孚，元亨，利貞，悔亡。", tuanci: "革，水火相息，二女同居，其志不相得，曰革。已日乃孚，革而信之，文明以說，大亨以正，革而當，其悔乃亡。天地革而四時成，湯武革命，順乎天而應乎人，革之時大矣哉。", xiangci: "澤中有火，革，君子以治曆明時。", lines_ci: ["鞏用黃牛之革。", "已日乃革之，征吉，无咎。", "征凶，貞厲，革言三就，有孚。", "悔亡，有孚，改命吉。", "大人虎變，未占有孚。", "君子豹變，小人革面，征凶，居貞吉。"], zen_tips: "革卦澤中有火，水火相息相變，象徵除舊布新之道。修行的蛻變如「大人虎變」，需經歷徹底的革新方能顯其文采斑斕。然變革之初人心未信（已日乃孚），須以誠信與時日證明其正當，操之過急則凶，順天應人才能革而當、其悔乃亡。" },
            { id: 50, name: "鼎", upper: "離", lower: "巽", guaci: "元吉，亨。", tuanci: "鼎，象也。以木巽火，亨飪也。聖人亨以享上帝，而大亨以養聖賢。巽而耳目聰明，柔進而上行，得中而應乎剛，是以元亨。", xiangci: "木上有火，鼎，君子以正位凝命。", lines_ci: ["鼎顛趾，利出否，得妾以其子，无咎。", "鼎有實，我仇有疾，不我能即，吉。", "鼎耳革，其行塞，雉膏不食。方雨虧悔，終吉。", "鼎折足，覆公餗，其形渥，凶。", "鼎黃耳金鉉，利貞。", "鼎玉鉉，大吉，无不利。"], zen_tips: "鼎卦木上有火，鼎器烹飪以養聖賢，象徵去故取新、安身立命之道。修行者當如鼎之「正位凝命」，安住自身本分，凝聚道念而不動搖。然亦須量力而行，若德淺而任重，猶如鼎折足、覆公餗，反招凶咎，不可不慎。" },
            { id: 51, name: "震", upper: "震", lower: "震", guaci: "亨。震來虩虩，笑言啞啞，震驚百里，不喪匕鬯。", tuanci: "震，亨。震來虩虩，恐致福也；笑言啞啞，後有則也；震驚百里，驚遠而懼邇也，出可以守宗廟社稷，以為祭主也。", xiangci: "洊雷，震，君子以恐懼脩省。", lines_ci: ["震來虩虩，後笑言啞啞，吉。", "震來厲，億喪貝，躋于九陵。勿逐，七日得。", "震蘇蘇，震行无眚。", "震遂泥。", "震往來厲，億无喪，有事。", "震索索，視矍矍，征凶。震不于其躬于其鄰，无咎。婚媾有言。"], zen_tips: "震卦上下皆震，雷聲相疊，威震四方。修行遇突發劇變、驚恐降臨之時，正是「恐懼脩省」的契機——外在的震動雖令人戰慄，若能藉此反觀自省、戒慎恐懼，反致福報（恐致福也）。心存敬畏而不失常度，終能笑言啞啞，安然無咎。" },
            { id: 52, name: "艮", upper: "艮", lower: "艮", guaci: "艮其背，不獲其身，行其庭，不見其人，无咎。", tuanci: "艮，止也，時止則止，時行則行，動靜不失其時，其道光明。艮其止，止其所也。上下敵應，不相與也，是以不獲其身。行其庭不見其人，无咎也。", xiangci: "兼山，艮，君子以思不出其位。", lines_ci: ["艮其趾，无咎，利永貞。", "艮其腓，不拯其隨，其心不快。", "艮其限，列其夤，厲薰心。", "艮其身，无咎。", "艮其輔，言有序，悔亡。", "敦艮，吉。"], zen_tips: "艮卦上下皆艮，兩山並峙，止靜之至。修行的真功夫在於「艮其背」——止於忘我之境，不執著於身相（不獲其身），亦不攀緣外境（不見其人），如此方能安止其心。君子當「思不出其位」，止其所當止，動靜合宜，此道光明。" },
            { id: 53, name: "漸", upper: "巽", lower: "艮", guaci: "女歸吉，利貞。", tuanci: "漸之進也，女歸吉也。進得位，往有功也，進以正，可以正邦也。其位剛得中也。止而巽，動不窮也。", xiangci: "山上有木，漸，君子以居賢德善俗。", lines_ci: ["鴻漸于干，小子厲，有言，无咎。", "鴻漸于磐，飲食衎衎，吉。", "鴻漸于陸，夫征不復，婦孕不育，凶，利禦寇。", "鴻漸于木，或得其桷，无咎。", "鴻漸于陵，婦三歲不孕，終莫之勝，吉。", "鴻漸于陸，其羽可用為儀，吉。"], zen_tips: "漸卦山上有木，樹木依山漸次成長，如鴻雁飛行依序而進，象徵循序漸進之德。修行不可躐等躁進，當效法鴻雁「漸」進之姿，一步一腳印、依止而後巽動，方能行穩致遠，「止而巽，動不窮也」，終至圓滿其位。" },
            { id: 54, name: "歸妹", upper: "震", lower: "兌", guaci: "征凶，无攸利。", tuanci: "歸妹，天地之大義也。天地不交，而萬物不興。歸妹，人之終始也，說以動，所歸妹也。征凶，位不當也；无攸利，柔乘剛也。", xiangci: "澤上有雷，歸妹，君子以永終知敝。", lines_ci: ["歸妹以娣，跛能履，征吉。", "眇能視，利幽人之貞。", "歸妹以須，反歸以娣。", "歸妹愆期，遲歸有時。", "帝乙歸妹，其君之袂，不如其娣之袂良。月幾望，吉。", "女承筐无實，士刲羊无血，无攸利。"], zen_tips: "歸妹卦澤上有雷，喜悅而妄動，象徵名位不當、行事躁進之戒。修行若心存攀緣妄動、急於求成（說以動），縱有一時之歡悅，終究位不當而无攸利。君子當「永終知敝」，慮及長遠終局，戒慎於行事之始，方能免於凶咎。" },
            { id: 55, name: "豐", upper: "震", lower: "離", guaci: "亨，王假之，勿憂，宜日中。", tuanci: "豐，大也。明以動，故豐。王假之，尚大也；勿憂，宜日中，宜照天下也。日中則昃，月盈則食，天地盈虛，與時消息，而況於人乎？況於鬼神乎？", xiangci: "雷電皆至，豐，君子以折獄致刑。", lines_ci: ["遇其配主，雖旬无咎，往有尚。", "豐其蔀，日中見斗。往得疑疾，有孚發若，吉。", "豐其沛，日中見沬。折其右肱，无咎。", "豐其蔀，日中見斗，遇其夷主，吉。", "來章，有慶譽，吉。", "豐其屋，蔀其家，闚其戶，闃其无人，三歲不覿，凶。"], zen_tips: "豐卦雷電交至，光明而動，象徵盛大豐盈之時。修行若得福慧俱豐、道業興隆，當謹記「日中則昃，月盈則食」——盛極必衰乃天地常理。此時愈應戒慎謙沖，勿耽溺於豐屋蔀家的表象榮耀，以免盛極而轉入闃其无人的孤寂凶境。" },
            { id: 56, name: "旅", upper: "離", lower: "艮", guaci: "小亨，旅貞吉。", tuanci: "旅，小亨，柔得中乎外而順乎剛，止而麗乎明，是以小亨，旅貞吉也，旅之時義大矣哉。", xiangci: "山上有火，旅，君子以明慎用刑而不留獄。", lines_ci: ["旅瑣瑣，斯其所取災。", "旅即次，懷其資，得童僕貞。", "旅焚其次，喪其童僕，貞厲。", "旅于處，得其資斧，我心不快。", "射雉，一矢亡，終以譽命。", "鳥焚其巢，旅人先笑後號咷，喪牛于易，凶。"], zen_tips: "旅卦山上有火，火行不定、寄旅無常，象徵人生如寄、漂泊在外之時。修行者身處異地或人生的過渡階段，當持守柔順謙和之道（柔得中乎外而順乎剛），謹言慎行、不與人結怨（明慎用刑而不留獄），方能小亨於旅途，安然自處。" },
            { id: 57, name: "巽", upper: "巽", lower: "巽", guaci: "小亨，利有攸往，利見大人。", tuanci: "重巽以申命，剛巽乎中正而志行，柔皆順乎剛，是以小亨，利有攸往，利見大人。", xiangci: "隨風，巽，君子以申命行事。", lines_ci: ["進退，利武人之貞。", "巽在床下，用史巫紛若，吉无咎。", "頻巽，吝。", "悔亡，田獲三品。", "貞吉，悔亡，无不利。无初有終，先庚三日，後庚三日，吉。", "巽在床下，喪其資斧，貞凶。"], zen_tips: "巽卦上下皆巽，風行相隨，象徵謙遜順入之德。修行貴在「巽」——如風般柔順滲透，無孔不入，卻不失其剛正之志（剛巽乎中正而志行）。然過度卑順則流於「巽在床下」的怯懦猶疑，唯有謙遜而不失原則，方能利有攸往。" },
            { id: 58, name: "兌", upper: "兌", lower: "兌", guaci: "亨，利貞。", tuanci: "兌，說也。剛中而柔外，說以利貞，是以順乎天而應乎人。說以先民，民忘其勞，說以犯難，民忘其死，說之大，民勸矣哉。", xiangci: "麗澤，兌，君子以朋友講習。", lines_ci: ["和兌吉。", "孚兌，吉，悔亡。", "來兌，凶。", "商兌未寧，介疾有喜。", "孚于剝，有厲。", "引兌。"], zen_tips: "兌卦上下皆兌，兩澤相連，喜悅交融，象徵誠信相悅之道。修行者當如「君子以朋友講習」，於法侶切磋琢磨中增長智慧、彼此喜悅。然當慎防諂媚逢迎的「來兌」之凶，唯有剛中柔外、誠信不虛的喜悅（孚兌），方是真實利貞之樂。" },
            { id: 59, name: "渙", upper: "巽", lower: "坎", guaci: "亨，王假有廟，利涉大川，利貞。", tuanci: "渙亨，剛來而不窮，柔得位乎外而上同。王假有廟，王乃在中也。利涉大川，乘木有功也。", xiangci: "風行水上，渙，先王以享於帝，立廟。", lines_ci: ["用拯馬壯，吉。", "渙奔其机，悔亡。", "渙其躬，无悔。", "渙其群，元吉。渙有丘，匪夷所思。", "渙汗其大號，渙王居，无咎。", "渙其血，去逖出，无咎。"], zen_tips: "渙卦風行水上，渙散渙渙，象徵渙解離散、亦是渙然冰釋之時。修行者若能藉此消散內心積聚已久的私執小我（渙其躬，渙其群），將小我融入大我、共修法界，反致「元吉」。渙散未必是壞事，關鍵在於渙去妄執，渙出光明。" },
            { id: 60, name: "節", upper: "坎", lower: "兌", guaci: "亨。苦節，不可貞。", tuanci: "節亨，剛柔分而剛得中。苦節不可貞，其道窮也。說以行險，當位以節，中正以通。天地節而四時成，節以制度，不傷財，不害民。", xiangci: "澤上有水，節，君子以制數度，議德行。", lines_ci: ["不出戶庭，无咎。", "不出門庭，凶。", "不節若，則嗟若，无咎。", "安節，亨。", "甘節，吉，往有尚。", "苦節，貞凶，悔亡。"], zen_tips: "節卦澤上有水，澤能容水而有限度，象徵節制有度之德。修行貴在調適得宜——過猶不及。當守則守（不出戶庭），當行則行（不出門庭反凶），能安於節制而甘之如飴（安節、甘節）方為吉祥；若拘泥苦節、矯枉過正，反使其道窮矣。" },
            { id: 61, name: "中孚", upper: "巽", lower: "兌", guaci: "豚魚吉，利涉大川，利貞。", tuanci: "中孚，柔在內而剛得中，說而巽，孚，乃化邦也。豚魚吉，信及豚魚也；利涉大川，乘木舟虛也；中孚以利貞，乃應乎天也。", xiangci: "澤上有風，中孚，君子以議獄緩死。", lines_ci: ["虞吉，有它不燕。", "鳴鶴在陰，其子和之；我有好爵，吾與爾靡之。", "得敵，或鼓或罷，或泣或歌。", "月幾望，馬匹亡，无咎。", "有孚攣如，无咎。", "翰音登于天，貞凶。"], zen_tips: "中孚卦澤上有風，中心虛而誠信具足，象徵至誠感通之德。修行的極致在於「中孚」——內心誠信真實，其感應之深遠，猶如「鳴鶴在陰，其子和之」，不言而喻、心心相印。誠信若僅托於虛聲浮名（翰音登于天），則難以長久，唯務內實。" },
            { id: 62, name: "小過", upper: "震", lower: "艮", guaci: "亨，利貞。可小事，不可大事。飛鳥遺之音，不宜上，宜下，大吉。", tuanci: "小過，小者過而亨也，過以利貞，與時行也。柔得中，是以小事吉也；剛失位而不中，是以不可大事也。有飛鳥之象焉，飛鳥遺之音，不宜上，宜下，大吉，上逆而下順也。", xiangci: "山上有雷，小過，君子以行過乎恭，喪過乎哀，用過乎儉。", lines_ci: ["飛鳥以凶。", "過其祖，遇其妣，不及其君，遇其臣，无咎。", "弗過防之，從或戕之，凶。", "无咎，弗過遇之，往厲必戒，勿用永貞。", "密雲不雨，自我西郊，公弋取彼在穴。", "弗遇過之，飛鳥離之，凶，是謂災眚。"], zen_tips: "小過卦山上有雷，雷聲越山而過，象徵行事宜稍過而不宜不及的小節之道。修行上，「行過乎恭，喪過乎哀，用過乎儉」——在恭敬、哀戚、節儉這類小處，寧可稍過，也勝過不及。然此僅適用於小事之修，切莫援引至大事而恃過躁進。" },
            { id: 63, name: "既濟", upper: "坎", lower: "離", guaci: "亨，小利貞。初吉終亂。", tuanci: "既濟亨小者，亨也；利貞，剛柔正而位當也。初吉，柔得中也，終止則亂，其道窮也。", xiangci: "水在火上，既濟，君子以思患而豫防之。", lines_ci: ["曳其輪，濡其尾，无咎。", "婦喪其茀，勿逐，七日得。", "高宗伐鬼方，三年克之，小人勿用。", "繻有衣袽，終日戒。", "東鄰殺牛，不如西鄰之禴祭，實受其福。", "濡其首，厲。"], zen_tips: "既濟卦水在火上，水火相濟、功成事就，象徵圓滿完成之時。然「初吉終亂，其道窮也」——修行證得初步成就，最忌自滿懈怠。君子當「思患豫防」，於圓滿之際更加謹慎戒懼（終日戒），方能長保既濟之吉，不致由盛轉衰。" },
            { id: 64, name: "未濟", upper: "離", lower: "坎", guaci: "亨。小狐汔濟，濡其尾，无攸利。", tuanci: "未濟亨，柔得中也；小狐汔濟，未出中也；濡其尾，无攸利，不續終也，雖不當位，剛柔應也。", xiangci: "火在水上，未濟，君子以慎辨物居方。", lines_ci: ["濡其尾，吝。", "曳其輪，貞吉。", "未濟，征凶，利涉大川。", "貞吉，悔亡，震用伐鬼方，三年有賞于大國。", "貞吉无悔，君子之光，有孚，吉。", "有孚于飲酒，无咎。濡其首，有孚，失是。"], zen_tips: "未濟卦火在水上，水火不交，功業未竟，象徵六十四卦終而未終、生生不息之理。修行之路本無究竟終點，縱使「小狐汔濟」——幾近成功，稍有不慎（濡其尾）仍前功盡棄。君子當「慎辨物居方」，戒慎謹守本分，於未濟之中孕育下一輪既濟的生機。" }
        ];

        const ALL_HEXAGRAMS = (() => {
            const tempSpecs = [...HEXAGRAMS_SPECS].sort((a, b) => a.id - b.id);

            return tempSpecs.map(spec => {
                const lowerLines = TRIGRAMS[spec.lower].lines;
                const upperLines = TRIGRAMS[spec.upper].lines;
                const binary = [...lowerLines, ...upperLines]; 
                
                const naturalName = spec.upper === spec.lower 
                    ? `${spec.name}為${TRIGRAMS[spec.upper].nature}` 
                    : `${TRIGRAMS[spec.upper].nature}${TRIGRAMS[spec.lower].nature}${spec.name}`;

                return {
                    ...spec,
                    binary,
                    naturalName,
                    unicode: String.fromCharCode(0x4DC0 + spec.id - 1)
                };
            });
        })();

        const PURE_TRIGRAMS = ["乾", "震", "坎", "艮", "坤", "巽", "離", "兌"];
        const GEN_NAMES = ["本宮卦", "一世卦", "二世卦", "三世卦", "四世卦", "五世卦", "遊魂卦", "歸魂卦"];
        
        const getPalaceMap = () => {
            const map = {}; 
            PURE_TRIGRAMS.forEach(pName => {
                const lines = TRIGRAMS[pName].lines; 
                const p = [...lines, ...lines]; 
                
                const gens = [
                    [p[0], p[1], p[2], p[3], p[4], p[5]], 
                    [1-p[0], p[1], p[2], p[3], p[4], p[5]], 
                    [1-p[0], 1-p[1], p[2], p[3], p[4], p[5]], 
                    [1-p[0], 1-p[1], 1-p[2], p[3], p[4], p[5]], 
                    [1-p[0], 1-p[1], 1-p[2], 1-p[3], p[4], p[5]], 
                    [1-p[0], 1-p[1], 1-p[2], 1-p[3], 1-p[4], p[5]], 
                    [1-p[0], 1-p[1], 1-p[2], p[3], 1-p[4], p[5]], 
                    [p[0], p[1], p[2], p[3], 1-p[4], p[5]] 
                ];
                
                gens.forEach((genBin, idx) => {
                    const key = genBin.join("");
                    map[key] = { palace: pName, genIndex: idx, genName: GEN_NAMES[idx] };
                });
            });
            return map;
        };

        const PALACE_MAP = getPalaceMap();

        function App() {
            const [selectedId, setSelectedId] = useState(1); 
            const [searchTerm, setSearchTerm] = useState("");
            const [activeLine, setActiveLine] = useState(null);
            
            // Mobile Navigation and Tabs System
            const [activeTab, setActiveTab] = useState("details"); // 'search', 'palaces', 'divine', 'details'
            const [activePalace, setActivePalace] = useState("乾");
            
            // Interactive Divination States
            const [coins, setCoins] = useState([1, 1, 1]); 
            const [isShaking, setIsShaking] = useState(false);
            const [shakeStep, setShakeStep] = useState(0); // 0 to 6
            const [shakedLines, setShakedLines] = useState([]); // Array of { sum, type, isYang, isChange }
            const [divinedHexId, setDivinedHexId] = useState(null);
            const [divinedChangeHexId, setDivinedChangeHexId] = useState(null);

            // Notification / Toast State
            const [toast, setToast] = useState(null);

            // AI Oracle interaction state
            const [userQuestion, setUserQuestion] = useState("");
            const [oracleResponse, setOracleResponse] = useState("");
            const [isOracleLoading, setIsOracleLoading] = useState(false);

            const currentHex = useMemo(() => {
                return ALL_HEXAGRAMS.find(h => h.id === selectedId) || ALL_HEXAGRAMS[0];
            }, [selectedId]);

            const showToast = (message) => {
                setToast(message);
                setTimeout(() => setToast(null), 4000);
            };

            const selectHexagram = (id, tabToGo = "details") => {
                setSelectedId(id);
                setActiveLine(null);
                setActiveTab(tabToGo);
                playZenChime();
            };

            const getHexByBinary = (binArr) => {
                const binStr = binArr.join("");
                return ALL_HEXAGRAMS.find(h => h.binary.join("") === binStr) || null;
            };

            const cuoHex = useMemo(() => {
                const bin = currentHex.binary.map(l => 1 - l);
                return getHexByBinary(bin);
            }, [currentHex]);

            const zongHex = useMemo(() => {
                const bin = [...currentHex.binary].reverse();
                return getHexByBinary(bin);
            }, [currentHex]);

            const fuHex = useMemo(() => {
                const bin = [currentHex.binary[1], currentHex.binary[2], currentHex.binary[3], currentHex.binary[4], currentHex.binary[5], currentHex.binary[0]];
                return getHexByBinary(bin);
            }, [currentHex]);

            const zaHex = useMemo(() => {
                const b = currentHex.binary;
                const bin = [b[1], b[2], b[3], b[2], b[3], b[4]];
                return getHexByBinary(bin);
            }, [currentHex]);

            const polarOne = useMemo(() => {
                const b = currentHex.binary;
                const bin = [b[0], b[1], b[2], b[1], b[2], b[3]];
                return getHexByBinary(bin);
            }, [currentHex]);

            const polarTwo = useMemo(() => {
                const b = currentHex.binary;
                const bin = [b[1], b[2], b[3], b[2], b[3], b[4]];
                return getHexByBinary(bin);
            }, [currentHex]);

            const polarThree = useMemo(() => {
                const b = currentHex.binary;
                const bin = [b[2], b[3], b[4], b[3], b[4], b[5]];
                return getHexByBinary(bin);
            }, [currentHex]);

            const filteredHexagrams = useMemo(() => {
                if (!searchTerm.trim()) return ALL_HEXAGRAMS;
                const term = searchTerm.toLowerCase();
                return ALL_HEXAGRAMS.filter(h => 
                    h.name.includes(term) || 
                    String(h.id) === term ||
                    h.naturalName.includes(term) ||
                    `${TRIGRAMS[h.upper].nature}${TRIGRAMS[h.lower].nature}`.includes(term) ||
                    `${h.upper}${h.lower}`.includes(term)
                );
            }, [searchTerm]);

            const shakeCoins = () => {
                if (shakeStep >= 6) return;
                setIsShaking(true);
                playZenChime();

                setTimeout(() => {
                    const roll = [Math.floor(Math.random() * 2), Math.floor(Math.random() * 2), Math.floor(Math.random() * 2)];
                    setCoins(roll);
                    
                    const sum = roll.reduce((acc, curr) => acc + (curr === 1 ? 3 : 2), 0);
                    let isYang = true;
                    let isChange = false;
                    
                    if (sum === 6) { isYang = false; isChange = true; } 
                    else if (sum === 7) { isYang = true; isChange = false; }
                    else if (sum === 8) { isYang = false; isChange = false; }
                    else if (sum === 9) { isYang = true; isChange = true; }

                    const newLine = { sum, isYang, isChange };
                    const nextLines = [...shakedLines, newLine];
                    setShakedLines(nextLines);
                    const nextStep = shakeStep + 1;
                    setShakeStep(nextStep);
                    setIsShaking(false);

                    if (nextStep === 6) {
                        const originalBin = nextLines.map(l => l.isYang ? 1 : 0);
                        const changedBin = nextLines.map(l => {
                            if (l.isChange) {
                                return l.isYang ? 0 : 1; 
                            }
                            return l.isYang ? 1 : 0;
                        });

                        const bHex = getHexByBinary(originalBin);
                        const cHex = getHexByBinary(changedBin);
                        if (bHex) setDivinedHexId(bHex.id);
                        if (cHex) setDivinedChangeHexId(cHex.id);
                        
                        showToast(`靈錢起卦圓滿！本卦：${bHex?.naturalName || "未知"}，之卦：${cHex?.naturalName || "未知"}`);
                    }
                }, 800);
            };

            const resetDivination = () => {
                setShakeStep(0);
                setShakedLines([]);
                setDivinedHexId(null);
                setDivinedChangeHexId(null);
                showToast("神案已清淨，可重新請靈起卦。");
            };

            const quickDivine = () => {
                playZenChime();
                const tempLines = [];
                for (let i = 0; i < 6; i++) {
                    const rand = Math.random();
                    let sum = 7;
                    if (rand < 0.125) sum = 6;
                    else if (rand < 0.5) sum = 7;
                    else if (rand < 0.875) sum = 8;
                    else sum = 9;

                    const isYang = (sum === 7 || sum === 9);
                    const isChange = (sum === 6 || sum === 9);
                    tempLines.push({ sum, isYang, isChange });
                }

                setShakedLines(tempLines);
                setShakeStep(6);

                const originalBin = tempLines.map(l => l.isYang ? 1 : 0);
                const changedBin = tempLines.map(l => l.isChange ? (l.isYang ? 0 : 1) : (l.isYang ? 1 : 0));

                const bHex = getHexByBinary(originalBin);
                const cHex = getHexByBinary(changedBin);
                if (bHex) setDivinedHexId(bHex.id);
                if (cHex) setDivinedChangeHexId(cHex.id);

                showToast(`一鍵感應功成！得卦「${bHex?.naturalName || "未知"}」`);
            };

            const askAbbotOracle = async (presetQuestion = "") => {
                const questionToAsk = presetQuestion || userQuestion;
                if (!questionToAsk.trim()) return;

                setIsOracleLoading(true);
                setOracleResponse("");
                playZenChime();

                const apiKey = ""; // Runtime automatically provisions the API key.
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

                const systemPrompt = `你是一位精通漢傳佛教、禪宗公案、密宗大圓滿心法與《易經》的禪密修道院長老。
對於弟子提出的世俗疑難、禪修障礙或命運祈問，請以「禪宗密宗修道院」長老之超然、圓融、慈悲視角進行解答。
請深度結合弟子「當前所問」與他們「目前點選的易經卦象（${currentHex.naturalName}卦）」進行分析。
你需要融會貫通以下易經變動維度：
1. 本卦（代表當下狀態）：${currentHex.naturalName}（${currentHex.guaci}）。
2. 錯卦（代表對立反面與隱藏盲點）：${cuoHex ? cuoHex.naturalName : "無"}。
3. 綜卦（代表換位思考與處境轉換）：${zongHex ? zongHex.naturalName : "無"}。
4. 復卦（代表時間演進與循環往復）：${fuHex ? fuHex.naturalName : "無"}。
5. 互卦/雜卦（代表內部本質與交織複雜）：${zaHex ? zaHex.naturalName : "無"}。
6. 六爻三極卦（代表天人地三極之演化階段）：第一極（${polarOne?.naturalName}）、第二極（${polarTwo?.naturalName}）、第三極（${polarThree?.naturalName}）。

請生成一篇結構嚴謹、文風古雅而溫慢的禪密開示：
- 第一部分：【禪林法界觀照】：慈悲接引弟子的問題，以一首空靈的禪詩或開示引導內心安頓。
- 第二部分：【卦象變局密鑰】：深度剖析本卦與錯綜複雜三卦的交織演化，如何直指當前問題的根源（對立面、轉化契機與核心盲點）。
- 第三部分：【三極天演軌跡】：透析三個三極極卦，梳理這件事情從萌芽（極一）、核心運作（極二）到最終歸宿（極三）的流轉局勢。
- 第四部分：【禪宗密宗修行印心指引】：給出切實的觀照心法（例如一句心咒、一個觀照要訣或呼吸調順法），指引弟子轉識成智。

請使用富含古風文筆、優美的繁體中文Markdown格式排版。`;

                const userPrompt = `弟子提問：\n「${questionToAsk}」\n請長老慈悲印心，開示迷津。`;

                let delay = 1000;
                for (let attempt = 0; attempt < 5; attempt++) {
                    try {
                        const response = await fetch(url, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userPrompt }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            })
                        });

                        const result = await response.json();
                        const candidateText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (candidateText) {
                            setOracleResponse(candidateText);
                            break;
                        } else {
                            throw new Error("Invalid response structure");
                        }
                    } catch (err) {
                        if (attempt === 4) {
                            setOracleResponse("「法不孤起，仗境方生。」禪院目前與法界連線受阻，請定心凝神，稍後再重新請益。");
                        } else {
                            await new Promise(resolve => setTimeout(resolve, delay));
                            delay *= 2;
                        }
                    }
                }
                setIsOracleLoading(false);
            };

            const palaceHexagramsList = useMemo(() => {
                const list = [];
                for (let id = 1; id <= 64; id++) {
                    const h = ALL_HEXAGRAMS.find(x => x.id === id);
                    if (h) {
                        const key = h.binary.join("");
                        const palaceInfo = PALACE_MAP[key];
                        if (palaceInfo && palaceInfo.palace === activePalace) {
                            list.push({
                                ...h,
                                ...palaceInfo
                            });
                        }
                    }
                }
                list.sort((a, b) => a.genIndex - b.genIndex);
                return list;
            }, [activePalace]);

            return (
                <div className="flex-grow flex flex-col h-full bg-[#f4f0ea] relative overflow-hidden select-none">
                    
                    {/* Cinnabar Red Floating Notification Toast */}
                    {toast && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-[#a61b29] text-white px-5 py-3 rounded-lg shadow-xl z-50 text-xs tracking-wider flex items-center gap-3 animate-draw border border-[#85121c]">
                            <i className="fa-solid fa-bell-ring animate-bounce"></i>
                            <span>{toast}</span>
                        </div>
                    )}

                    {/* Unified Monastery Header */}
                    <div className="p-4 border-b border-[#d4c9b5] bg-[#e5ddd0]/90 backdrop-blur-md flex items-center justify-between shadow-sm z-30 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="w-9 h-9 rounded-full bg-seal-red text-white flex items-center justify-center font-black text-sm shadow-md border border-[#85121c]/20">
                                院
                            </div>
                            <div>
                                <h1 className="font-extrabold text-neutral-800 tracking-wider text-sm md:text-base">禪宗密宗修道院</h1>
                                <p className="text-[10px] text-neutral-500 tracking-wider font-semibold">六十四卦水墨禪修 ‧ 八宮搖卦占卜系統</p>
                            </div>
                        </div>
                        <button 
                            onClick={playZenChime}
                            className="w-8 h-8 rounded-full bg-[#ede7dc] hover:bg-[#dfd7c8] transition-colors flex items-center justify-center text-neutral-600 hover:text-[#a61b29]"
                            title="敲擊法磬"
                        >
                            <i className="fa-solid fa-bell text-sm"></i>
                        </button>
                    </div>

                    {/* Responsive Double-Column / App Viewport */}
                    <div className="flex-grow flex flex-col md:flex-row overflow-hidden relative z-10 pb-16 md:pb-0">
                        
                        {/* LEFT COLUMN: Sidebar (Desktop only) */}
                        <div className="hidden md:flex w-80 bg-[#ede7dc] border-r border-[#d4c9b5] flex-col h-full">
                            <div className="p-3">
                                <div className="relative">
                                    <input 
                                        type="text"
                                        placeholder="搜尋卦名、自然現象 (如: 水雷)..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="w-full pl-9 pr-4 py-2 bg-[#fcfaf7] border border-[#d4c9b5] rounded-lg focus:outline-none focus:border-[#a61b29] transition-all text-sm scroll-container placeholder-neutral-400"
                                    />
                                    <i className="fa-solid fa-feather-pointed absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400 text-xs"></i>
                                    {searchTerm && (
                                        <button 
                                            onClick={() => setSearchTerm("")}
                                            className="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-400 hover:text-neutral-600"
                                        >
                                            <i className="fa-solid fa-xmark"></i>
                                        </button>
                                    )}
                                </div>
                            </div>

                            <div className="flex-grow overflow-y-auto px-2 pb-4 scroll-container">
                                <div className="space-y-1">
                                    {filteredHexagrams.map((spec) => {
                                        const isSelected = spec.id === selectedId;
                                        return (
                                            <button
                                                key={spec.id}
                                                onClick={() => selectHexagram(spec.id, "details")}
                                                className={`w-full text-left p-2.5 rounded-lg transition-all flex items-center justify-between group ${
                                                    isSelected 
                                                    ? "bg-[#dfd7c8] border-l-4 border-l-[#a61b29] shadow-sm text-neutral-900" 
                                                    : "hover:bg-[#e8e0d1] text-neutral-700 hover:text-neutral-900"
                                                }`}
                                            >
                                                <div className="flex items-center gap-3">
                                                    <span className={`text-[11px] font-mono w-5 text-right ${isSelected ? "text-[#a61b29] font-bold" : "text-neutral-400"}`}>
                                                        {spec.id}
                                                    </span>
                                                    <span className="text-xl font-medium select-none text-neutral-800">
                                                        {spec.unicode}
                                                    </span>
                                                    <div>
                                                        <span className={`font-bold tracking-wide text-xs ${isSelected ? "text-[#a61b29]" : "text-neutral-800"}`}>
                                                            {spec.naturalName}卦
                                                        </span>
                                                        <span className="block text-[9px] text-neutral-500 font-serif leading-none mt-0.5">
                                                            {spec.upper}上{spec.lower}下
                                                        </span>
                                                    </div>
                                                </div>
                                                <i className={`fa-solid fa-circle-chevron-right text-xs transition-transform duration-300 ${
                                                    isSelected ? "text-[#a61b29] translate-x-0" : "text-neutral-300 group-hover:translate-x-1"
                                                }`}></i>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* MOBILE TAB DISPLAY & CENTRAL SCREEN CONTROLLER */}
                        <div className="flex-grow flex flex-col md:flex-row h-full overflow-hidden">
                            
                            {/* Mobile View tab: Search */}
                            {activeTab === "search" && (
                                <div className="flex-grow flex flex-col h-full bg-[#fcfaf7] md:hidden">
                                    <div className="p-4 border-b border-[#ede7dc]">
                                        <div className="relative">
                                            <input 
                                                type="text"
                                                placeholder="搜尋卦名、自然 (如: 山水)..."
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className="w-full pl-9 pr-4 py-2.5 bg-[#f4f0ea] border border-[#d4c9b5] rounded-xl focus:outline-none focus:border-[#a61b29] text-sm"
                                            />

                                                    <span className="text-[10px] text-neutral-400 font-serif block">第二極 (234爻 + 345爻)</span>
                                                    <span className="font-bold text-neutral-800">
                                                        {polarTwo ? `運行 ‧ ${polarTwo.naturalName}` : "無"}
                                                    </span>
                                                </div>
                                                {polarTwo && (
                                                    <button 
                                                        onClick={() => selectHexagram(polarTwo.id, "details")}
                                                        className="text-[10px] text-[#a61b29] font-bold"
                                                    >
                                                        載入
                                                    </button>
                                                )}
                                            </div>

                                            <div className="bg-white p-3 rounded-xl border border-neutral-100 flex justify-between items-center text-xs hover:border-neutral-300">
                                                <div>
                                                    <span className="text-[10px] text-neutral-400 font-serif block">第三極 (345爻 + 456爻)</span>
                                                    <span className="font-bold text-neutral-800">
                                                        {polarThree ? `歸宿 ‧ ${polarThree.naturalName}` : "無"}
                                                    </span>
                                                </div>
                                                {polarThree && (
                                                    <button 
                                                        onClick={() => selectHexagram(polarThree.id, "details")}
                                                        className="text-[10px] text-[#a61b29] font-bold"
                                                    >
                                                        載入
                                                    </button>
                                                )}
                                            </div>
                                        </div>

                                        {/* AI Oracle Sandbox */}
                                        <div className="border border-neutral-200 rounded-2xl p-4 bg-[#faf6ed] shadow-sm relative overflow-hidden">
                                            <div className="absolute right-4 top-4 opacity-[0.05] select-none text-6xl text-seal-red">
                                                <i className="fa-solid fa-dharmachakra animate-spin-slow"></i>
                                            </div>

                                            <h3 className="font-bold text-neutral-800 text-xs tracking-widest mb-2 flex items-center gap-2">
                                                <span className="w-2 h-2 rounded-full bg-seal-red animate-ping"></span>
                                                <span>修道院長老法界印心開示</span>
                                            </h3>

                                            <textarea 
                                                rows="3"
                                                placeholder="在此輸入您此時此刻正遭遇的困境、修道疑惑或世間煩惱..."
                                                value={userQuestion}
                                                onChange={(e) => setUserQuestion(e.target.value)}
                                                className="w-full p-3 text-xs bg-white border border-neutral-300 rounded-xl focus:outline-none focus:ring-1 focus:ring-[#a61b29] resize-none scroll-container"
                                            ></textarea>

                                            <button
                                                onClick={() => askAbbotOracle()}
                                                disabled={isOracleLoading || !userQuestion.trim()}
                                                className={`w-full mt-2 py-2.5 rounded-xl font-bold text-xs tracking-wider transition-all shadow-md flex items-center justify-center gap-2 ${
                                                    isOracleLoading || !userQuestion.trim()
                                                    ? "bg-neutral-300 text-neutral-500 cursor-not-allowed shadow-none"
                                                    : "bg-seal-red text-white hover:bg-seal-red/90"
                                                }`}
                                            >
                                                {isOracleLoading ? (
                                                    <>
                                                        <i className="fa-solid fa-spinner animate-spin"></i>
                                                        <span>長老參禪觀照法界中...</span>
                                                    </>
                                                ) : (
                                                    <>
                                                        <i className="fa-solid fa-seedling"></i>
                                                        <span>請禪師開示當前局勢</span>
                                                    </>
                                                )}
                                            </button>

                                            {oracleResponse && (
                                                <div className="mt-4 bg-white border border-[#ede7dc] rounded-xl p-4 max-h-[300px] overflow-y-auto scroll-container animate-draw">
                                                    <div className="text-xs text-neutral-700 leading-relaxed font-serif whitespace-pre-line prose max-w-none">
                                                        {oracleResponse}
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                    </div>
                                </div>
                            )}

                        </div>

                    </div>

                    {/* MOBILE TAB BAR BOTTOM NAVIGATION */}
                    <div className="md:hidden fixed bottom-0 left-0 right-0 bg-[#ede7dc]/95 backdrop-blur-md border-t border-[#d4c9b5] flex justify-around py-2.5 z-40 shadow-lg">
                        <button 
                            onClick={() => { setActiveTab("search"); playZenChime(); }}
                            className={`flex flex-col items-center gap-1 text-[10px] font-bold ${activeTab === "search" ? "text-[#a61b29]" : "text-neutral-500"}`}
                        >
                            <i className="fa-solid fa-scroll text-base"></i>
                            <span>檢索目錄</span>
                        </button>
                        <button 
                            onClick={() => { setActiveTab("palaces"); playZenChime(); }}
                            className={`flex flex-col items-center gap-1 text-[10px] font-bold ${activeTab === "palaces" ? "text-[#a61b29]" : "text-neutral-500"}`}
                        >
                            <i className="fa-solid fa-circle-nodes text-base"></i>
                            <span>八宮大系</span>
                        </button>
                        <button 
                            onClick={() => { setActiveTab("divine"); playZenChime(); }}
                            className={`flex flex-col items-center gap-1 text-[10px] font-bold ${activeTab === "divine" ? "text-[#a61b29]" : "text-neutral-500"}`}
                        >
                            <i className="fa-solid fa-coins text-base"></i>
                            <span>起卦占卜</span>
                        </button>
                        <button 
                            onClick={() => { setActiveTab("details"); playZenChime(); }}
                            className={`flex flex-col items-center gap-1 text-[10px] font-bold ${activeTab === "details" ? "text-[#a61b29]" : "text-neutral-500"}`}
                        >
                            <i className="fa-solid fa-leaf text-base"></i>
                            <span>卦象妙諦</span>
                        </button>
                    </div>

                </div>
            );
        }

        function getLinePositionText(pos) {
            switch(pos) {
                case 0: return "初";
                case 1: return "二";
                case 2: return "三";
                case 3: return "四";
                case 4: return "五";
                case 5: return "上";
                default: return "";
            }
        }

        function getLineSpiritualInterpretation(hexId, linePos, isYang) {
            const yinYangSpiritual = isYang ? "剛健之氣" : "柔順之德";
            const positionLessons = [
                "【萌芽與潛藏】：代表處於局勢之底，元氣未足。切忌鋒芒太露、急於求成。此時修行當以「靜虛觀照」為根本，積蓄實力，深挖定力。",
                "【中正與平穩】：正值內卦之中位，陰陽調和。行止得宜，得大眾協助。代表此時最應守持「中道」，隨緣行善，身心常保平衡安適。",
                "【危險與轉折】：處於內卦與外卦的交接過渡點。局勢變幻莫測，極易多疑多懼。切記「夕惕若厲」，在危險邊緣中時時提起覺照，便能轉危為安。",
                "【試探與高企】：已踏入外卦高位，戰戰兢兢。代表即將迎來變局大展宏圖。修行者應退居幕後、守持無我謙恭，戒慎恐懼，切莫貪戀權位。",
                "【尊榮與頂峰】：此乃大中至正、君臨天下之位。代表無漏無滯的完滿。當以廣大悲憫、大公無私、救度一切眾生之心相應，則福報無限，諸佛護祐。",
                "【窮盡與消亡】：事物已發展到最終的極致，隨即面臨逆轉與反彈（物極必反）。防範盛極而衰。此時應「急流勇退」，放下所有執著，回歸清淨本源。"
            ];

            const specs = ALL_HEXAGRAMS.find(h => h.id === hexId);
            const name = specs ? specs.naturalName : "卦";

            return `弟子在《${name}卦》中觸及此爻。這代表著在此卦相所指引的局勢中，${positionLessons[linePos]}。利用其內含的【${yinYangSpiritual}】，您當能在塵俗考驗中圓通無礙、見性成佛。`;
        }

        const renderLineGlyph = (isYang, isHighlighted = false, index = 0) => {
            const glowClass = isHighlighted ? "shadow-[0_0_15px_rgba(166,27,41,0.4)]" : "";
            
            if (isYang) {
                return (
                    <div className={`h-4 w-full bg-gradient-to-r from-neutral-800 via-neutral-900 to-neutral-800 rounded transition-all duration-300 ${glowClass}`}></div>
                );
            } else {
                return (
                    <div className="h-4 w-full flex justify-between gap-4 relative transition-all duration-300">
                        <div className={`h-full w-[45%] bg-gradient-to-r from-neutral-800 via-neutral-900 to-neutral-800 rounded ${glowClass}`}></div>
                        <div className="w-[10%] h-full flex items-center justify-center opacity-25">
                            <span className="text-[6px] text-[#a61b29] font-bold">•</span>
                        </div>
                        <div className={`h-full w-[45%] bg-gradient-to-l from-neutral-800 via-neutral-900 to-neutral-800 rounded ${glowClass}`}></div>
                    </div>
                );
            }
        };

        window.onload = function() {
            const container = document.getElementById('root');
            const root = ReactDOM.createRoot(container);
            root.render(<App />);
        }
    </script>
</body>
</html>
